<html lang="it">
<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ocean: #0a3d62;
      --sky: #1e6fa5;
      --wave: #2980b9;
      --sand: #f5e6c8;
      --sand-dark: #e8d5a3;
      --sunset: #e67e22;
      --white: #fdfaf5;
      --text: #1a1a2e;
      --text-light: #5a6478;
      --house-red: #e74c3c;
      --beach-yellow: #f1c40f;
      --market-blue: #2980b9;
      --panel-w: 380px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ocean);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ‚ĒÄ‚ĒÄ‚ĒÄ HEADER ‚ĒÄ‚ĒÄ‚ĒÄ */
    header {
      background: var(--ocean);
      padding: 0 24px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon { font-size: 26px; }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--sand);
      letter-spacing: 0.02em;
    }

    .header-sub {
      font-size: 12px;
      color: rgba(245,230,200,0.55);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ‚ĒÄ‚ĒÄ‚ĒÄ LEGEND ‚ĒÄ‚ĒÄ‚ĒÄ */
    .legend {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--sand);
      font-size: 12px;
      font-weight: 500;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      flex-shrink: 0;
    }

    /* ‚ĒÄ‚ĒÄ‚ĒÄ MAIN LAYOUT ‚ĒÄ‚ĒÄ‚ĒÄ */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ‚ĒÄ‚ĒÄ‚ĒÄ MAP ‚ĒÄ‚ĒÄ‚ĒÄ */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* ‚ĒÄ‚ĒÄ‚ĒÄ SIDE PANEL ‚ĒÄ‚ĒÄ‚ĒÄ */
    #panel {
      width: var(--panel-w);
      background: var(--white);
      display: flex;
      flex-direction: column;
      transform: translateX(var(--panel-w));
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 500;
      overflow: hidden;
      flex-shrink: 0;
      border-left: 1px solid var(--sand-dark);
    }

    #panel.open { transform: translateX(0); }

    .panel-header {
      background: var(--ocean);
      padding: 20px 22px 18px;
      flex-shrink: 0;
    }

    .panel-close {
      float: right;
      background: none;
      border: none;
      color: rgba(245,230,200,0.7);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    .panel-close:hover { color: var(--sand); }

    .panel-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sunset);
      margin-bottom: 4px;
    }

    .panel-house-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--sand);
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .panel-house-desc {
      font-size: 12px;
      color: rgba(245,230,200,0.6);
      font-weight: 300;
    }

    .panel-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      background: var(--sunset);
      color: white;
      text-decoration: none;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.15s;
    }
    .panel-link:hover { background: #d35400; transform: translateY(-1px); }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 0 0 20px;
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 2px; }

    .section-label {
      padding: 16px 22px 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-light);
      border-bottom: 1px solid var(--sand-dark);
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .distance-item {
      padding: 13px 22px;
      border-bottom: 1px solid rgba(232,213,163,0.3);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: background 0.15s;
    }
    .distance-item:hover { background: rgba(245,230,200,0.3); }

    .dist-icon {
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .dist-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .dist-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .badge:hover { opacity: 0.8; }

    .badge-walk  { background: #eafaf1; color: #27ae60; }
    .badge-drive { background: #eaf3ff; color: #2980b9; }
    .badge-aria  { background: #f4f4f4; color: #888; }

    /* ‚ĒÄ‚ĒÄ‚ĒÄ LEAFLET CUSTOM ‚ĒÄ‚ĒÄ‚ĒÄ */
    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
      padding: 0 !important;
      overflow: hidden !important;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18) !important;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      min-width: 200px;
    }

    .leaflet-popup-tip-container { display: none !important; }

    .popup-house {
      padding: 14px 16px;
      border-left: 4px solid var(--house-red);
    }

    .popup-beach {
      padding: 14px 16px;
      border-left: 4px solid var(--beach-yellow);
    }

    .popup-market {
      padding: 14px 16px;
      border-left: 4px solid var(--market-blue);
    }

    .popup-type {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 3px;
    }

    .popup-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .popup-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border: none;
      border-radius: 14px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .popup-btn-red { background: var(--house-red); color: white; }
    .popup-btn-red:hover { background: #c0392b; }

    .popup-btn-outline {
      background: transparent;
      color: var(--ocean);
      border: 1.5px solid var(--ocean);
      margin-left: 4px;
    }
    .popup-btn-outline:hover { background: var(--ocean); color: white; }

    /* ‚ĒÄ‚ĒÄ‚ĒÄ CUSTOM MARKERS ‚ĒÄ‚ĒÄ‚ĒÄ */
    .marker-house, .marker-beach, .marker-market {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 3px 12px rgba(0,0,0,0.3);
      font-size: 15px;
      transition: transform 0.15s;
      cursor: pointer;
    }

    .marker-house  { width: 36px; height: 36px; background: var(--house-red); }
    .marker-beach  { width: 30px; height: 30px; background: #e6a800; }
    .marker-market { width: 30px; height: 30px; background: var(--market-blue); }

    /* ‚ĒÄ‚ĒÄ‚ĒÄ INTRO HINT ‚ĒÄ‚ĒÄ‚ĒÄ */
    .map-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,61,98,0.88);
      backdrop-filter: blur(6px);
      color: var(--sand);
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      z-index: 900;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 7px;
      opacity: 1;
      transition: opacity 0.5s;
    }
    .map-hint.hidden { opacity: 0; }

    @media (max-width: 700px) {
      header {
        height: auto;
        padding: 10px 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      #panel { width: 100%; position: absolute; top: 0; right: 0; bottom: 0; transform: translateX(100%); }
      #panel.open { transform: translateX(0); }
      .header-sub { display: none; }
      .legend { gap: 12px; }
      .legend-item { font-size: 11px; }
    }
  </style>

// ‚ĒÄ‚ĒÄ‚ĒÄ API Key OpenRouteService ‚ĒÄ‚ĒÄ‚ĒÄ
const ORS_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjQyNWJmNjBhMjAxNTRmNzM5NzY4YTJmOWQ3OWFlZDNiIiwiaCI6Im11cm11cjY0In0=";

// ‚ĒÄ‚ĒÄ‚ĒÄ Distanza in linea d'aria (usata come fallback) ‚ĒÄ‚ĒÄ‚ĒÄ
function distanzaLineaAria(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLon/2)**2;
  return parseFloat((R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1));
}

// ‚ĒÄ‚ĒÄ‚ĒÄ Chiamata OpenRouteService ‚ĒÄ‚ĒÄ‚ĒÄ
async function getORS(fromLat, fromLon, toLat, toLon, profile) {
  // profile: 'foot-walking' | 'driving-car'
  const url = `https://api.openrouteservice.org/v2/directions/${profile}?api_key=${ORS_KEY}&start=${fromLon},${fromLat}&end=${toLon},${toLat}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const d = await r.json();
    const seg = d.features?.[0]?.properties?.segments?.[0];
    if (!seg) return null;
    return {
      km:  (seg.distance / 1000).toFixed(1),
      min: Math.round(seg.duration / 60)
    };
  } catch {
    return null;
  }
}

function gmapsLink(fromLat, fromLon, toLat, toLon, mode) {
  return `https://www.google.com/maps/dir/?api=1&origin=${fromLat},${fromLon}&destination=${toLat},${toLon}&travelmode=${mode}`;
}

function renderBadges(elId, walk, drive, fromLat, fromLon, toLat, toLon) {
  const el = document.getElementById(elId);
  if (!el) return;
  const wLink = gmapsLink(fromLat, fromLon, toLat, toLon, 'walking');
  const dLink = gmapsLink(fromLat, fromLon, toLat, toLon, 'driving');
  const km    = distanzaLineaAria(fromLat, fromLon, toLat, toLon);

  let html = '';
  if (walk)  html += `<a class="badge badge-walk"  href="${wLink}" target="_blank" rel="noopener" title="Stima ‚ÄĒ clicca per il tempo reale su Google Maps">ūüö∂ ~${walk.min} min ¬∑ ${walk.km} km ‚Üó</a>`;
  else       html += `<a class="badge badge-walk"  href="${wLink}" target="_blank" rel="noopener">ūüö∂ A piedi ‚Üó</a>`;
  if (drive) html += `<a class="badge badge-drive" href="${dLink}" target="_blank" rel="noopener" title="Stima ‚ÄĒ clicca per il tempo reale su Google Maps">ūüöó ~${drive.min} min ¬∑ ${drive.km} km ‚Üó</a>`;
  else       html += `<a class="badge badge-drive" href="${dLink}" target="_blank" rel="noopener">ūüöó In auto ‚Üó</a>`;
  if (!walk && !drive) html += `<span class="badge badge-aria">ūüďź ~${km} km in linea d'aria</span>`;
  if (walk || drive)   html += `<span class="badge badge-aria" style="font-size:10px">‚ö†ÔłŹ stime, clicca per Google Maps</span>`;

  el.innerHTML = html;
}

// ‚ĒÄ‚ĒÄ‚ĒÄ PANNELLO LATERALE ‚ĒÄ‚ĒÄ‚ĒÄ
let currentCasaId = null;

async function openPanel(casaId) {
  const casa = CASE.find(c => c.id === casaId);
  if (!casa) return;

  currentCasaId = casaId;
  hideHint();

  document.getElementById('panel-name').textContent = casa.nome;
  document.getElementById('panel-desc').textContent = casa.descrizione;
  document.getElementById('panel-link').href         = casa.link;
  document.getElementById('panel-gmaps').href        = `https://www.google.com/maps?q=${casa.lat},${casa.lon}`;

  document.getElementById('panel').classList.add('open');

  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  // Ordina spiagge e supermercati per distanza in linea d'aria dalla casa
  const spiaggeOrdinate = [...SPIAGGE]
    .map(s => ({ ...s, _km: distanzaLineaAria(casa.lat, casa.lon, s.lat, s.lon) }))
    .sort((a, b) => a._km - b._km);

  const mercatiOrdinati = [...SUPERMERCATI]
    .map(m => ({ ...m, _km: distanzaLineaAria(casa.lat, casa.lon, m.lat, m.lon) }))
    .sort((a, b) => a._km - b._km);

  // Sezione spiagge ‚ÄĒ inserisce subito i link Google Maps come fallback
  body.innerHTML += `<div class="section-label">ūüŹĖÔłŹ Spiagge vicine</div>`;
  spiaggeOrdinate.forEach((s, i) => {
    const wLink = gmapsLink(casa.lat, casa.lon, s.lat, s.lon, 'walking');
    const dLink = gmapsLink(casa.lat, casa.lon, s.lat, s.lon, 'driving');
    body.innerHTML += `
      <div class="distance-item">
        <span class="dist-icon">${s.emoji}</span>
        <div>
          <div class="dist-name">${s.nome}</div>
          <div class="dist-badges" id="beach-badges-${i}">
            <a class="badge badge-walk"  href="${wLink}" target="_blank" rel="noopener">ūüö∂ Calcolo...</a>
            <a class="badge badge-drive" href="${dLink}" target="_blank" rel="noopener">ūüöó Calcolo...</a>
          </div>
        </div>
      </div>`;
  });

  // Sezione supermercati
  body.innerHTML += `<div class="section-label">ūüõí Supermercati vicini</div>`;
  mercatiOrdinati.forEach((m, i) => {
    const wLink = gmapsLink(casa.lat, casa.lon, m.lat, m.lon, 'walking');
    const dLink = gmapsLink(casa.lat, casa.lon, m.lat, m.lon, 'driving');
    body.innerHTML += `
      <div class="distance-item">
        <span class="dist-icon">${m.emoji}</span>
        <div>
          <div class="dist-name">${m.nome}</div>
          <div class="dist-badges" id="market-badges-${i}">
            <a class="badge badge-walk"  href="${wLink}" target="_blank" rel="noopener">ūüö∂ Calcolo...</a>
            <a class="badge badge-drive" href="${dLink}" target="_blank" rel="noopener">ūüöó Calcolo...</a>
          </div>
        </div>
      </div>`;
  });

  // Calcola distanze reali con ORS, una alla volta per non sforare i rate limit
  const sleep = ms => new Promise(res => setTimeout(res, ms));

  for (let i = 0; i < spiaggeOrdinate.length; i++) {
    const s = spiaggeOrdinate[i];
    const [walk, drive] = await Promise.all([
      getORS(casa.lat, casa.lon, s.lat, s.lon, 'foot-walking'),
      getORS(casa.lat, casa.lon, s.lat, s.lon, 'driving-car')
    ]);
    renderBadges(`beach-badges-${i}`, walk, drive, casa.lat, casa.lon, s.lat, s.lon);
    await sleep(200);
  }

  for (let i = 0; i < mercatiOrdinati.length; i++) {
    const m = mercatiOrdinati[i];
    const [walk, drive] = await Promise.all([
      getORS(casa.lat, casa.lon, m.lat, m.lon, 'foot-walking'),
      getORS(casa.lat, casa.lon, m.lat, m.lon, 'driving-car')
    ]);
    renderBadges(`market-badges-${i}`, walk, drive, casa.lat, casa.lon, m.lat, m.lon);
    await sleep(200);
  }
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  currentCasaId = null;
}
